name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install CI dependencies (no dlib)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Lint (ruff)
        run: ruff check onboard/ simulation/ tests/ tools/ scripts/ || true

      - name: Unit tests (KOKPIT_SIM=1)
        env:
          KOKPIT_SIM: "1"
        run: pytest tests/ -q --timeout=180

      - name: Software demo smoke
        env:
          KOKPIT_SIM: "1"
        timeout-minutes: 3
        run: python3 simulation/software_demo.py
